name: "Test: can NPM_TOKEN publish @mixpeek/mcp"

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mcp-server
        uses: actions/checkout@v4
        with:
          repository: mixpeek/mcp-server
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Dry-run publish (only tests auth)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          # --dry-run still checks auth against registry
          npm publish --access public --dry-run 2>&1 | tail -3
          # Actually try a real publish — skip if already published
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "@mixpeek/mcp@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "::notice::@mixpeek/mcp@${PKG_VERSION} already exists on npm — token scope test inconclusive"
          else
            npm publish --access public
            echo "::notice::✓ mixpeek/ui's NPM_TOKEN can publish @mixpeek/mcp — it's org-wide"
          fi
